<!DOCTYPE html>
<html>

<head>
    <title>NyayaSetu Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div>
        ⚖️ <b>NyayaSetu Dashboard</b>
    </div>

    <div style="font-size:14px; opacity:0.8;">
        AI Legal Case Management
    </div>

</div>


<!-- MAIN -->
<div class="container">

    <div class="card">

        <h2>📊 Case Dashboard</h2>

        <!-- CHART -->
        <div style="margin-top:20px;">
            <canvas id="caseChart" height="100"></canvas>
        </div>

        <br>

        <!-- STATS -->
        <div class="stats">

            <div>
                Total Cases<br>
                <span id="total">0</span>
            </div>

            <div style="color:green;">
                Approved<br>
                <span id="approved">0</span>
            </div>

            <div style="color:red;">
                Rejected<br>
                <span id="rejected">0</span>
            </div>

        </div>

        <br>

        <!-- CONTROLS -->
        <input
            type="text"
            id="search"
            placeholder="🔍 Search case..."
            onkeyup="filterCases()"
        >

        <select id="filter" onchange="filterCases()">
            <option>All</option>
            <option>Approved</option>
            <option>Rejected</option>
        </select>

        <button class="btn" onclick="loadCases()">
            🔄 Refresh
        </button>

        <br><br>

        <!-- TABLE -->
        <table class="dashboard-table">

            <thead>
                <tr>
                    <th>Case Title</th>
                    <th>Date</th>
                    <th>Direction</th>
                    <th>Confidence</th>
                    <th>Status</th>
                    <th>Time</th>
                </tr>
            </thead>

            <tbody id="tableBody"></tbody>

        </table>

    </div>

</div>



<script>

const BASE_URL = "http://127.0.0.1:5000";

let allCases = [];

let chartInstance = null;


// 🟣 LOAD CASES
async function loadCases(){

    try{

        let res = await fetch(`${BASE_URL}/cases`);

        if(!res.ok){
            throw new Error("Server error");
        }

        let cases = await res.json();

        allCases = cases;

        renderTable(cases);

    }catch(err){

        console.error("Dashboard Error:", err);

        document.getElementById("tableBody").innerHTML = `
            <tr>
                <td colspan="6" style="text-align:center; color:red; padding:20px;">
                    ❌ Backend not connected
                </td>
            </tr>
        `;
    }
}



// 🟣 RENDER TABLE
function renderTable(cases){

    let table = document.getElementById("tableBody");

    table.innerHTML = "";

    let total = cases.length;
    let approved = 0;
    let rejected = 0;

    // EMPTY
    if(cases.length === 0){

        table.innerHTML = `
            <tr>
                <td colspan="6" style="text-align:center; padding:20px;">
                    ⚠️ No cases uploaded yet
                </td>
            </tr>
        `;

        updateStats(0,0,0);

        updateChart(0,0);

        return;
    }

    // LOOP
    cases.forEach(c => {

        if(c.status === "Approved"){
            approved++;
        }

        if(c.status === "Rejected"){
            rejected++;
        }

        let row = `
            <tr>

                <td>
                    ${c.case_title || "-"}
                </td>

                <td>
                    ${c.date || "-"}
                </td>

                <td title="${c.key_direction || ""}">
                    ${truncate(c.key_direction, 60)}
                </td>

                <td>
                    ${c.confidence || "-"}
                </td>

                <td style="
                    color:${getColor(c.status)};
                    font-weight:bold;
                ">
                    ${c.status || "Pending"}
                </td>

                <td>
                    ${c.timestamp || "-"}
                </td>

            </tr>
        `;

        table.innerHTML += row;
    });

    updateStats(total, approved, rejected);

    updateChart(approved, rejected);
}



// 🟣 UPDATE STATS
function updateStats(total, approved, rejected){

    document.getElementById("total").innerText = total;

    document.getElementById("approved").innerText = approved;

    document.getElementById("rejected").innerText = rejected;
}



// 🟣 CHART
function updateChart(approved, rejected){

    let canvas = document.getElementById("caseChart");

    if(!canvas){
        return;
    }

    let ctx = canvas.getContext("2d");

    if(chartInstance){
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {

        type: "bar",

        data: {

            labels: ["Approved", "Rejected"],

            datasets: [{

                label: "Cases",

                data: [approved, rejected],

                borderWidth: 1
            }]
        },

        options: {

            responsive: true,

            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}



// 🟣 FILTER
function filterCases(){

    let search =
        document.getElementById("search")
        .value
        .toLowerCase();

    let filter =
        document.getElementById("filter")
        .value;

    let filtered = allCases.filter(c => {

        let title =
            (c.case_title || "").toLowerCase();

        let direction =
            (c.key_direction || "").toLowerCase();

        let matchSearch =
            title.includes(search) ||
            direction.includes(search);

        let matchFilter =
            filter === "All" ||
            c.status === filter;

        return matchSearch && matchFilter;
    });

    renderTable(filtered);
}



// 🟣 STATUS COLOR
function getColor(status){

    if(status === "Approved"){
        return "green";
    }

    if(status === "Rejected"){
        return "red";
    }

    return "#f59e0b";
}



// 🟣 SHORT TEXT
function truncate(text, limit){

    if(!text){
        return "-";
    }

    return text.length > limit
        ? text.substring(0, limit) + "..."
        : text;
}



// 🟣 AUTO LOAD
loadCases();

setInterval(loadCases, 3000);

</script>

</body>
</html>
